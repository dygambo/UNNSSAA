name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Package release bundle
        run: |
          mkdir -p dist
          tar -czf dist/unnssaa-release.tar.gz --exclude=node_modules --exclude=.git .

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: unnssaa-release-bundle
          path: dist/unnssaa-release.tar.gz
